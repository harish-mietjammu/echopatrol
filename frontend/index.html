<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoPatrol — Live Operations</title>
    <script>
      // Apply theme before React mounts to prevent flash.
      // Default is 'light' for first-time visitors.
      (function () {
        try {
          var t = localStorage.getItem('echo-theme') || 'light';
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
